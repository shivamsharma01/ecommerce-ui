# Production Deployment — mcart-ui (Angular SSR)
#
# Image is applied at deploy time (Cloud Build uses kubectl set image). Initial apply
# must reference a real image; default below matches Artifact Registry layout.
#
# Substitutions (envsubst / your CD tool):
#   SERVICE_NAME       — default: mcart-ui
#   APP_VERSION        — e.g. 1.2.3 or git tag
#   ARTIFACT_REGISTRY  — host+path without tag, e.g. us-central1-docker.pkg.dev/my-project/docker-apps/mcart-ui
#   IMAGE_TAG          — e.g. commit SHA or semver
#
# Example image after substitution:
#   us-central1-docker.pkg.dev/my-project/docker-apps/mcart-ui:abc1234
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcart-ui
  labels:
    app.kubernetes.io/name: mcart-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: mcart
    app.kubernetes.io/version: "0.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mcart-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcart-ui
        app.kubernetes.io/component: frontend
        app.kubernetes.io/version: "0.0.0"
    spec:
      # Optional: bind a dedicated least-privilege ServiceAccount (recommended in production).
      # serviceAccountName: mcart-ui
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: mcart-ui
      containers:
        - name: mcart-ui
          # Cloud Build / kubectl set image overwrites this (must match container name above).
          # Replace with your Artifact Registry image before first apply, or rely on Cloud Build kubectl set image.
          # Pattern: <REGION>-docker.pkg.dev/<PROJECT_ID>/<REPO>/mcart-ui:<tag>
          image: us-central1-docker.pkg.dev/CHANGEME_PROJECT_ID/CHANGEME_DOCKER_REPO/mcart-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
          # Optional: inject ConfigMaps / Secrets (create resources separately).
          envFrom:
            - configMapRef:
                name: mcart-ui-config
                optional: true
            - secretRef:
                name: mcart-ui-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
              ephemeral-storage: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
