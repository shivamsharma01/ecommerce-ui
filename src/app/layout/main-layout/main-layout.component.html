<div class="layout">
  <mat-toolbar color="primary" class="toolbar">
    <a mat-button routerLink="/catalog" class="brand">MCart</a>
    <span class="spacer"></span>
    <a mat-button routerLink="/catalog" routerLinkActive="active">Catalog</a>
    <a mat-button routerLink="/search" routerLinkActive="active">Search</a>
    @if (auth.isAuthenticated() && !auth.isPlatformAdmin()) {
      <a mat-button routerLink="/cart" routerLinkActive="active">Cart</a>
      <a mat-button routerLink="/orders" routerLinkActive="active">Orders</a>
    }
    @if (auth.isAuthenticated() && auth.isPlatformAdmin()) {
      <button mat-button [matMenuTriggerFor]="adminMenu" aria-label="Admin menu">
        <mat-icon>admin_panel_settings</mat-icon>
        Admin
      </button>
      <mat-menu #adminMenu="matMenu">
        <a mat-menu-item routerLink="/admin/inventory">
          <mat-icon>inventory_2</mat-icon>
          Inventory
        </a>
        <a mat-menu-item routerLink="/admin/add-product">
          <mat-icon>add_box</mat-icon>
          Add product
        </a>
        <button mat-menu-item type="button" (click)="triggerReindex()">
          <mat-icon>sync</mat-icon>
          Reindex search
        </button>
      </mat-menu>
    }
    @if (auth.isAuthenticated()) {
      <button mat-button [matMenuTriggerFor]="accountMenu" aria-label="Account menu">
        <mat-icon>account_circle</mat-icon>
        Account
      </button>
      <mat-menu #accountMenu="matMenu">
        <button mat-menu-item type="button" (click)="openAccountProfile()">
          <mat-icon>person</mat-icon>
          Profile details
        </button>
        <button mat-menu-item type="button" (click)="logout()">
          <mat-icon>logout</mat-icon>
          Log out
        </button>
      </mat-menu>
    } @else {
      <a mat-button routerLink="/login" routerLinkActive="active">Sign in</a>
      <a mat-button routerLink="/signup" routerLinkActive="active">Sign up</a>
    }
  </mat-toolbar>
  <main class="content">
    <router-outlet />
  </main>
</div>
