<mat-card class="product-card">
  @if (primaryImage(); as image) {
    <img mat-card-image [src]="image" [alt]="product().name" />
  }
  <mat-card-header>
    <mat-card-title>{{ product().name }}</mat-card-title>
    @if (product().categories.length) {
      <mat-chip-set>
        @for (category of product().categories; track category) {
          <mat-chip>{{ category }}</mat-chip>
        }
      </mat-chip-set>
    }
  </mat-card-header>
  <mat-card-content>
    <p>{{ product().description }}</p>
    <p class="price">{{ product().price | currency }}</p>
  </mat-card-content>
  <mat-card-actions>
    <a mat-button color="primary" [routerLink]="['/products', product().id]">View Details</a>
  </mat-card-actions>
</mat-card>
